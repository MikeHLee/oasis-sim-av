# Police-tape-in-rain baseline scenario.
#
# Tuned so the MVP demonstrates two failure modes at once:
#   1. Tape width (5 cm) < LiDAR vertical ring spacing at working range
#   2. Camera pixel footprint > tape width at the same range -> blurred washout
#
# Both sensors observe the same fluttering mass-spring ribbon strung between
# two buildings flanking the road, in "rain" (5% LiDAR dropout, 3 cm sigma).

seed: 42
duration_s: 8.0
dt: 0.01

output:
  dir: runs
  frame_every: 10      # sensors fire every 100 ms (10 Hz) at dt=10 ms
  save_png: true
  save_ply: true
  save_jsonl: true

world:
  ground_z: 0.0
  buildings:
    - aabb: [-30.0, -20.0, 0.0, -10.0,  -5.0, 22.0]
    - aabb: [-30.0,   5.0, 0.0, -10.0,  20.0, 24.0]
    - aabb: [ 10.0, -20.0, 0.0,  30.0,  -5.0, 30.0]
    - aabb: [ 10.0,   5.0, 0.0,  30.0,  20.0, 18.0]
    - aabb: [ 40.0, -20.0, 0.0,  60.0,  -5.0, 16.0]
    - aabb: [ 40.0,   5.0, 0.0,  60.0,  20.0, 20.0]
  roads:
    - - [-40.0, -5.0]
      - [ 70.0, -5.0]
      - [ 70.0,  5.0]
      - [-40.0,  5.0]
  tape:
    # Strung between the inside faces of the pair of buildings at x~0
    anchor_a: [ -10.0, -5.0, 3.0 ]
    anchor_b: [  10.0, -5.0, 3.0 ]
    length: 20.4
    width: 0.05
    n_length: 40
    n_width: 2
    mass_per_particle: 0.01
    spring_k: 500.0
    spring_damping: 0.8
    global_damping: 0.03
    wind_bias:   [0.0, 1.2, 0.2]
    wind_noise_std: 2.5

vehicle:
  wheelbase: 2.7
  initial_x: -35.0
  initial_y: 0.0
  initial_theta: 0.0
  controller:
    type: impulse_steer
    base_v: 10.0
    base_delta: 0.0
    impulse_time: 3.0
    impulse_delta: 0.08
    impulse_duration: 0.4

lidar:
  offset: [0.0, 0.0, 1.7]
  elevation_fov_deg: [-15.0, 10.0]
  elevation_rings: 32
  azimuth_fov_deg: [-40.0, 40.0]
  azimuth_rays: 512
  range_m: 80.0
  range_noise_std_m: 0.03
  rain_dropout_prob: 0.05

camera:
  offset: [1.5, 0.0, 1.4]
  forward: [1.0, 0.0, 0.0]
  up: [0.0, 0.0, 1.0]
  fov_h_deg: 60.0
  width: 320
  height: 240
  motion_blur_samples: 4
  exposure_s: 0.01
