# Curved-road scenario: SIM-003 (Bezier-pursuit controller) + SIM-004 (shadow rays).
#
# Vehicle tracks a cubic-Bezier centerline that gently curves right.  The
# camera has ``shadow_rays: true`` so buildings cast hard shadows onto the
# road and the tape casts a visible shadow where it's backlit.
#
# Included primarily as a regression scenario for the curved-path and
# shading features; the fusion failure mode is not the primary focus here.

seed: 5
duration_s: 3.0
dt: 0.01

output:
  dir: runs
  frame_every: 10
  save_png: true
  save_ply: true
  save_jsonl: true

world:
  ground_z: 0.0
  buildings:
    # Flanking buildings along the curved path
    - aabb: [ -5.0, -30.0,  0.0,  10.0, -10.0, 18.0]
    - aabb: [ 15.0,   5.0,  0.0,  35.0,  25.0, 25.0]
    - aabb: [ 40.0, -20.0,  0.0,  55.0,  -5.0, 20.0]
  roads:
    - - [-20.0, -5.0]
      - [ 60.0, -5.0]
      - [ 60.0,  5.0]
      - [-20.0,  5.0]
  tape:
    # Tape across the road mid-curve, strung between the flanking blocks
    anchor_a: [ 10.0, -10.0, 3.0 ]
    anchor_b: [ 15.0,   5.0, 3.0 ]
    length: 16.0
    width: 0.05
    n_length: 32
    n_width: 2
    mass_per_particle: 0.01
    spring_k: 500.0
    spring_damping: 0.8
    global_damping: 0.03
    wind_bias:   [0.3, 0.8, 0.2]
    wind_noise_std: 1.8

vehicle:
  wheelbase: 2.7
  initial_x: -15.0
  initial_y: 0.0
  initial_theta: 0.0
  controller:
    type: bezier_pursuit
    base_v: 8.0
    # Centerline that curves slightly toward +y on the far side
    bezier_control_points:
      - [-15.0, 0.0]
      - [  5.0, 0.0]
      - [ 20.0, 4.0]
      - [ 50.0, 4.0]
    bezier_lookahead_m: 5.0
    bezier_max_delta_rad: 0.5

lidar:
  offset: [0.0, 0.0, 1.7]
  elevation_fov_deg: [-15.0, 10.0]
  elevation_rings: 32
  azimuth_fov_deg: [-40.0, 40.0]
  azimuth_rays: 512
  range_m: 80.0
  range_noise_std_m: 0.03
  rain_dropout_prob: 0.05

camera:
  offset: [1.5, 0.0, 1.4]
  forward: [1.0, 0.0, 0.0]
  up: [0.0, 0.0, 1.0]
  fov_h_deg: 60.0
  width: 320
  height: 240
  motion_blur_samples: 2
  exposure_s: 0.01
  shadow_rays: true

bev:
  center: [17.5, 0.0]
  extent_m: 60.0
  size_px: 256
  show_vehicle_marker: true
  show_road: true
